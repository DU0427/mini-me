<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>minime - 设置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font:13px/1.6 'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif;
  display:flex;color:#1f1f1f;background:#f5f5f9;
  -webkit-font-smoothing:antialiased;user-select:none
}

/* ===== 侧栏 ===== */
.sidebar{
  width:200px;min-width:200px;height:100%;
  background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%);
  display:flex;flex-direction:column;
  box-shadow:2px 0 12px rgba(0,0,0,.08)
}
.sidebar .title{
  padding:28px 20px 20px;
  font-size:14px;font-weight:700;color:#a0a0c0;letter-spacing:1px;
  text-transform:uppercase
}
.sidebar .nav{flex:1;padding:4px 10px}
.sidebar .nav a{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;margin-bottom:2px;
  font-size:13px;color:#8888aa;cursor:pointer;
  border-radius:8px;text-decoration:none;
  transition:all .2s ease
}
.sidebar .nav a:hover{color:#ddd;background:rgba(255,255,255,.06)}
.sidebar .nav a.on{
  color:#fff;background:rgba(124,58,237,.25);
  font-weight:600;box-shadow:inset 0 0 0 1px rgba(124,58,237,.3)
}

/* ===== 内容 ===== */
.main{flex:1;height:100%;display:flex;flex-direction:column;min-width:0}

/* ===== 头部 ===== */
.main .hd{
  padding:20px 28px 14px;
  border-bottom:1px solid #e8e8ee;
  background:#fff
}
.main .hd h2{font-size:16px;font-weight:700;color:#1a1a2e}

/* ===== 面板容器 ===== */
.panel{flex:1;display:flex;flex-direction:column;height:100%}
.panel .bd{flex:1;overflow-y:auto;padding:8px 0;background:#fff}
.panel .ft{
  display:flex;justify-content:flex-end;align-items:center;gap:10px;
  padding:14px 28px 16px;
  border-top:1px solid #e8e8ee;
  background:#fff;flex-shrink:0
}

/* ===== 设置�?===== */
.row{
  display:flex;align-items:center;justify-content:space-between;
  min-height:52px;padding:0 28px;margin:0 4px;
  border-radius:6px;transition:background .15s
}
.row:hover{background:#f8f7ff}
.row:not(:last-child){border-bottom:1px solid #f0f0f5}

/* 滑条 + 数�?*/
.row .lbl{
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:500;color:#2c2c3a
}
.row .lbl .ico{font-size:16px}
.row .r{
  display:flex;align-items:center;gap:12px;flex-shrink:0
}
.row .r em{
  font-style:normal;font-size:13px;font-weight:500;color:#7C3AED;
  min-width:60px;text-align:right;font-variant-numeric:tabular-nums
}
.row input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:140px;height:4px;
  background:linear-gradient(to right,#7C3AED 0%,#7C3AED 50%,#e0e0eb 50%,#e0e0eb 100%);
  outline:none;border-radius:2px;cursor:pointer;
  transition:background .1s
}
.row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:#7C3AED;cursor:pointer;border:2px solid #fff;
  box-shadow:0 1px 4px rgba(124,58,237,.35);
  transition:transform .15s,box-shadow .15s
}
.row input[type=range]::-webkit-slider-thumb:hover{
  transform:scale(1.15);
  box-shadow:0 2px 8px rgba(124,58,237,.4)
}

/* ===== 按钮 ===== */
.btn{
  padding:7px 20px;border:none;border-radius:6px;
  font-size:12px;font-weight:600;cursor:pointer;
  font-family:inherit;line-height:20px;
  transition:all .2s ease
}
.btn.p{
  background:linear-gradient(135deg,#7C3AED,#6D28D9);
  color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.25)
}
.btn.p:hover{
  background:linear-gradient(135deg,#6D28D9,#5B21B6);
  box-shadow:0 4px 12px rgba(124,58,237,.35);
  transform:translateY(-1px)
}
.btn.p:active{transform:translateY(0)}
.btn.s{
  background:#fff;color:#555;border:1px solid #d8d8e5
}
.btn.s:hover{background:#f5f5fa;border-color:#c8c8d8}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(26,26,46,.85);
  backdrop-filter:blur(8px);
  color:#fff;padding:8px 20px;border-radius:8px;
  font-size:13px;opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  pointer-events:none;z-index:10;
  box-shadow:0 4px 16px rgba(0,0,0,.15)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== 关于 ===== */
.about{
  padding:60px 28px;text-align:center;
  background:linear-gradient(180deg,#faf9ff 0%,#fff 100%)
}
.about .ico{font-size:40px;margin-bottom:12px}
.about h3{font-size:16px;font-weight:700;color:#1a1a2e}
.about p{font-size:13px;color:#888;margin-top:6px}
.about .ver{
  margin-top:16px;font-size:11px;color:#bbb;
  background:#f5f5fa;padding:4px 14px;border-radius:10px;display:inline-block
}

.hide{display:none}
</style>
</head>
<body>

<div class="sidebar">
  <div class="title">minime</div>
  <div class="nav">
    <a class="on" data-tab="reminders">🔔 提醒设置</a>
    <a data-tab="about">ℹ️ 关于 minime</a>
  </div>
</div>

<div class="main">
  <div id="tab-reminders" class="panel">
    <div class="hd"><h2>提醒设置</h2></div>
    <div class="bd">
      <div class="row">
        <span class="lbl"><span class="ico">💧</span>喝水提醒</span>
        <span class="r">
          <em id="v1">45 分钟</em>
          <input type="range" id="s1" min="5" max="120" value="45" step="5">
        </span>
      </div>
      <div class="row">
        <span class="lbl"><span class="ico">🦵</span>久坐提醒</span>
        <span class="r">
          <em id="v2">60 分钟</em>
          <input type="range" id="s2" min="15" max="180" value="60" step="5">
        </span>
      </div>
      <div class="row">
        <span class="lbl"><span class="ico">👀</span>远眺提醒</span>
        <span class="r">
          <em id="v3">30 分钟</em>
          <input type="range" id="s3" min="10" max="90" value="30" step="5">
        </span>
      </div>
    </div>
    <div class="ft">
      <button class="btn s" id="btnR">恢复默认</button>
      <button class="btn p" id="btnS">保存</button>
    </div>
  </div>

  <div id="tab-about" class="panel hide">
    <div class="hd"><h2>关于 minime</h2></div>
    <div class="about">
      <div class="ico">🎮</div>
      <h3>minime</h3>
      <p>你的桌面健康小伴�?/p>
      <div class="ver">版本 1.0.0</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">设置已保�?/div>

<script>
const ipc=(()=>{try{return require('electron').ipcRenderer}catch{return null}})()
document.querySelectorAll('.nav a').forEach(el=>{
  el.onclick=()=>{
    document.querySelectorAll('.nav a').forEach(n=>n.className='')
    el.className='on'
    document.querySelectorAll('.panel').forEach(t=>t.classList.add('hide'))
    document.getElementById('tab-'+el.dataset.tab).classList.remove('hide')
  }
})
const $=id=>document.getElementById(id)
const s1=$('s1'),s2=$('s2'),s3=$('s3'),v1=$('v1'),v2=$('v2'),v3=$('v3')
const f=m=>m+' 分钟'
function updateSlider(sl){
  const pct=((sl.value-sl.min)/(sl.max-sl.min))*100
  sl.style.background=`linear-gradient(to right,#7C3AED 0%,#7C3AED ${pct}%,#e0e0eb ${pct}%,#e0e0eb 100%)`
}
const sliders=[s1,s2,s3];const vals=[v1,v2,v3]
sliders.forEach((sl,i)=>{
  sl.oninput=()=>{vals[i].textContent=f(sl.value);updateSlider(sl)}
  updateSlider(sl)
})
let tt
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2000)}
async function load(){
  if(!ipc)return;const st=await ipc.invoke('settings:get')
  if(!st)return
  s1.value=st.drinkInterval||45;s2.value=st.standInterval||60;s3.value=st.eyeRestInterval||30
  v1.textContent=f(s1.value);v2.textContent=f(s2.value);v3.textContent=f(s3.value)
  sliders.forEach(updateSlider)
}
async function save(){
  if(!ipc)return
  await ipc.invoke('settings:save',{drinkInterval:+s1.value,standInterval:+s2.value,eyeRestInterval:+s3.value})
  toast('设置已保存')
}
$('btnS').onclick=save;$('btnR').onclick=()=>{s1.value=45;s2.value=60;s3.value=30;v1.textContent=f(45);v2.textContent=f(60);v3.textContent=f(30);sliders.forEach(updateSlider)}
document.onkeydown=e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')save()}
load()
</script>
</body>
</html>
