<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>minime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none; -webkit-app-region: no-drag;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app { width: 100%; height: 100%; position: relative; cursor: grab; }
    #app:active { cursor: grabbing; }
    #three-canvas { width: 100%; height: 100%; display: block; pointer-events: auto; }

    /* ============================================================
       提醒气泡
       ============================================================ */
    #ui-overlay {
      position: absolute;
      bottom: 82px; left: 50%; transform: translateX(-50%);
      pointer-events: none; opacity: 0;
      transition: opacity 0.4s ease; z-index: 20;
    }
    #ui-overlay.visible { opacity: 1; }

    .reminder-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(18, 20, 30, 0.8);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 10px 14px 10px 10px;
      min-width: 200px;
      max-width: 280px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      pointer-events: auto;
      cursor: pointer;
      animation: bubble-in 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reminder-bubble .bubble-icon {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .reminder-bubble .bubble-content {
      flex: 1;
      min-width: 0;
    }

    .reminder-bubble .bubble-message {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.35;
      word-break: break-word;
    }

    .reminder-bubble .bubble-hint {
      font-size: 8px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 3px;
      letter-spacing: 0.3px;
    }

    .reminder-bubble .bubble-action {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      color: white;
      flex-shrink: 0;
      opacity: 0.8;
      transition: opacity 0.2s, transform 0.2s;
    }
    .reminder-bubble:hover .bubble-action {
      opacity: 1;
      transform: scale(1.1);
    }

    /* 类型色变体 */
    .reminder-bubble.type-drink_water { border-color: rgba(96, 176, 255, 0.2); }
    .reminder-bubble.type-stand_up { border-color: rgba(255, 170, 68, 0.2); }
    .reminder-bubble.type-late_night { border-color: rgba(129, 140, 248, 0.2); }
    .reminder-bubble.type-eye_rest { border-color: rgba(52, 211, 153, 0.2); }

    .reminder-bubble.level-warning { border-color: rgba(251, 191, 36, 0.3); }
    .reminder-bubble.level-urgent {
      border-color: rgba(248, 113, 113, 0.3);
      animation: bubble-in 0.4s cubic-bezier(0.16, 1, 0.3, 1), pulse-border 2s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35); }
      50% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 20px rgba(248, 113, 113, 0.15); }
    }

    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(12px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="three-canvas"></canvas>
    <div id="ui-overlay">
      <!-- Reminder bubbles here -->
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
