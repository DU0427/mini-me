<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>minime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none; -webkit-app-region: no-drag;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app { width: 100%; height: 100%; position: relative; cursor: grab; }
    #app:active { cursor: grabbing; }
    #three-canvas { width: 100%; height: 100%; display: block; pointer-events: auto; }

    /* ============================================================
       提醒气泡 — 对话气泡风格
       ============================================================ */
    #ui-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      pointer-events: none; opacity: 0;
      transition: none; z-index: 20;
      display: flex; justify-content: center;
      padding-top: 6px;
    }
    #ui-overlay.visible { opacity: 1; }

    .reminder-bubble {
      pointer-events: auto; cursor: pointer;
      animation: pop-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      max-width: calc(100% - 16px);
    }

    /* 气泡主体 */
    .reminder-bubble .bubble-body {
      display: flex; align-items: flex-start; gap: 6px;
      background: rgba(20, 20, 30, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    /* 三角尾巴（向下） */
    .reminder-bubble .bubble-tail {
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 7px solid rgba(20, 20, 30, 0.82);
      margin: -1px auto 0;
      position: relative;
      z-index: 0;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
    }

    /* 类型左色条 */
    .reminder-bubble .bubble-body::before {
      content: ''; position: absolute; left: 0; top: 0;
      width: 3px; height: 100%; border-radius: 3px 0 0 3px;
    }
    .reminder-bubble.type-drink_water .bubble-body::before { background: #60B0FF; }
    .reminder-bubble.type-stand_up .bubble-body::before { background: #FFAA44; }
    .reminder-bubble.type-late_night .bubble-body::before { background: #818CF8; }
    .reminder-bubble.type-eye_rest .bubble-body::before { background: #34D399; }

    /* 图标 */
    .reminder-bubble .bubble-icon {
      width: 24px; height: 24px; min-width: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; margin-top: 1px;
    }
    .reminder-bubble.type-drink_water .bubble-icon { background: rgba(96,176,255,0.2); }
    .reminder-bubble.type-stand_up .bubble-icon { background: rgba(255,170,68,0.2); }
    .reminder-bubble.type-late_night .bubble-icon { background: rgba(129,140,248,0.2); }
    .reminder-bubble.type-eye_rest .bubble-icon { background: rgba(52,211,153,0.2); }

    /* 文字 — 自动换行 */
    .reminder-bubble .bubble-msg {
      font-size: 11px; font-weight: 500; line-height: 1.5;
      color: rgba(255, 255, 255, 0.92);
      word-break: break-word;
    }

    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.85) translateY(-10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes pop-out {
      from { opacity: 1; transform: scale(1) translateY(0); }
      to { opacity: 0; transform: scale(0.85) translateY(-10px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="three-canvas"></canvas>
    <div id="ui-overlay">
      <!-- Reminder bubbles here -->
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
