<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>minime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none; -webkit-app-region: no-drag;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app { width: 100%; height: 100%; position: relative; cursor: grab; }
    #app:active { cursor: grabbing; }
    #three-canvas { width: 100%; height: 100%; display: block; pointer-events: auto; }

    /* ============================================================
       提醒气泡 — 简洁紧凑
       ============================================================ */
    #ui-overlay {
      position: absolute;
      top: 8px; left: 50%; transform: translateX(-50%);
      pointer-events: none; opacity: 0;
      transition: opacity 0.3s ease; z-index: 20;
    }
    #ui-overlay.visible { opacity: 1; }

    .reminder-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 5px 12px 5px 8px;
      white-space: nowrap;
      pointer-events: auto;
      cursor: pointer;
      animation: bubble-in 0.3s ease;
    }
    .reminder-bubble .bubble-icon { font-size: 13px; }
    .reminder-bubble .bubble-msg {
      font-size: 11px; font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
    }
    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="three-canvas"></canvas>
    <div id="ui-overlay">
      <!-- Reminder bubbles here -->
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
